name: Arduino Lint

on: [ push, pull_request ] # 触发条件：推送代码或PR时

jobs:
  lint:
    runs-on: ubuntu-latest # 在最新版Ubuntu系统上运行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 第一步：检出您的代码
      - name: Run Arduino Lint
        uses: arduino/arduino-lint-action@v2 # 第二步：运行本Action
        with:
          compliance: strict
          library-manager: update
